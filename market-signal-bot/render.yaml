services:
  # 1. FastAPI REST API Web Service (Runs Web API, Scanner, and Telegram Bot consolidated)
  - type: web
    name: market-signal-bot-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-signal-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PERSONAL_USE_ONLY
        value: "true"
      - key: FORCE_SCAN
        value: "true"

  # 2. React static frontend dashboard
  - type: web
    name: market-signal-bot-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: market-signal-bot-api
          type: web
          property: host

databases:
  - name: market-signal-db
    plan: free
