name: Daily NSE Ticker Scan

on:
  schedule:
    - cron: '15 10 * * 1-5' # 10:15 UTC (3:45 PM IST) Monday to Friday
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub website

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Stock Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cron_runner.py
