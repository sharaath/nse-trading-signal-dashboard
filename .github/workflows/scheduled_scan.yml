name: Daily NSE Ticker Scan

on:
  schedule:
    - cron: '*/15 4-10 * * 1-5' # Runs every 15 minutes from 9:30 AM IST to 3:30 PM IST, Monday to Friday
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub website

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permissions to commit/push the cache file back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Stock Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cron_runner.py

      - name: Commit and push cache updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f last_signals.json active_trades.json last_intraday_signals.json active_intraday_trades.json daily_scan_report.md
          git commit -m "Auto-update signals cache and daily report" || echo "No changes to commit"
          git push origin main
